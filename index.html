
</body>
</html><!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHILLZ ESPORT</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  color: white;
  background-color: #05090a;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(0, 212, 199, 0.15), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(0, 212, 199, 0.10), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(0, 212, 199, 0.08), transparent 50%);
}

/* HERO */
.hero {
  text-align: center;
  padding: 40px 20px;
  background: linear-gradient(135deg, rgba(0,212,199,0.18), transparent);
  border-bottom: 1px solid rgba(0,212,199,0.4);
}

.hero h1 {
  font-size: 32px;
  color: #00d4c7;
}

.hero-logo {
  width: 90px;
  height: 90px;
  border-radius: 50%;
}

/* NAV */
nav {
  position: sticky;
  top: 0;
  background: #0c1416;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  border-bottom: 2px solid #00d4c7;
}

nav button {
  background: none;
  border: none;
  color: white;
}

/* SECTIONS */
section {
  display: none;
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

section.active {
  display: block;
}

/* CARDS */
.card {
  background: #10181a;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #1d2a2d;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
}

/* PLAYER */
.player {
  background: #0d1517;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #00d4c7;
  cursor: pointer;
  text-align: center;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.popup img {
  max-width: 80%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="hero">
  <img src="logo.png" class="hero-logo">
  <h1>CHILLZ ESPORT</h1>
</div>

<nav>
  <button onclick="show('about')">Hakkımızda</button>
  <button onclick="show('players')">Oyuncular</button>
  <button onclick="show('live')">Canlı Maç</button>
</nav>

<!-- ABOUT -->
<section id="about" class="active">
  <h2>Hakkımızda</h2>
  <div class="card">
    CHILLZ ESPORT 🏆 Rekabetçi Brawl Stars & CODM takımı.
  </div>
</section>

<!-- PLAYERS -->
<section id="players">
  <h2>Oyuncular</h2>

  <div class="grid">
    <div class="player" onclick="openPlayer('ionas.png')">IONAS</div>
    <div class="player" onclick="openPlayer('haxelia.png')">HAXELIA</div>
    <div class="player" onclick="openPlayer('deniz.png')">FT | DENIZ</div>
    <div class="player" onclick="openPlayer('kamacii.png')">KAMACII</div>
    <div class="player" onclick="openPlayer('espoir.png')">ESPOIRR</div>
    <div class="player" onclick="openPlayer('daddyscary.png')">DADDYSCARY</div>
    <div class="player" onclick="openPlayer('yukizawa.png')">YUKIZAWA</div>
    <div class="player" onclick="openPlayer('dest.png')">DEST</div>
    <div class="player" onclick="openPlayer('natotal.png')">NATOTAL</div>
  </div>
</section>

<!-- LIVE -->
<section id="live">
  <h2>Canlı Maç</h2>
  <div class="card">
    CHILLZ vs Enemy Team - LIVE<br>
    Skor: 1 - 0
  </div>
</section>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closePopup()">
  <img id="popupImg">
</div>

<script>

function show(id){
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function openPlayer(img){
  document.getElementById("popupImg").src = img;
  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
